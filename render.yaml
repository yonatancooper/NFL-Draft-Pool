databases:
  - name: nfl-draft-pool-db
    plan: free
    databaseName: draftpool
    user: draftpool

services:
  - type: web
    name: nfl-draft-pool
    runtime: docker
    plan: free
    envVars:
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nfl-draft-pool-db
          property: connectionString
      - key: PORT
        value: "10000"
